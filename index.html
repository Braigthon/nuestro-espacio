<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Fernanda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<svg style="display:none" aria-hidden="true">
  <symbol id="icon-carta" viewBox="0 0 64 64">
    <rect x="8" y="16" width="48" height="34" rx="4" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <path d="M8,18 L32,38 L56,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="48" cy="42" rx="4.5" ry="3.5" fill="currentColor" opacity="0.55"/>
    <circle cx="43" cy="36" r="2.3" fill="currentColor" opacity="0.55"/>
    <circle cx="48" cy="34" r="2.3" fill="currentColor" opacity="0.55"/>
    <circle cx="53" cy="36" r="2.3" fill="currentColor" opacity="0.55"/>
  </symbol>

  <symbol id="icon-galeria" viewBox="0 0 64 64">
    <rect x="11" y="6" width="42" height="50" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
    <rect x="16" y="11" width="32" height="28" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <circle cx="24" cy="20" r="3" fill="currentColor"/>
    <path d="M16,39 L26,27 L34,34 L40,25 L48,39 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <ellipse cx="41" cy="48" rx="3.5" ry="2.8" fill="currentColor" opacity="0.55"/>
    <circle cx="37.5" cy="44" r="1.8" fill="currentColor" opacity="0.55"/>
    <circle cx="41" cy="42.5" r="1.8" fill="currentColor" opacity="0.55"/>
    <circle cx="44.5" cy="44" r="1.8" fill="currentColor" opacity="0.55"/>
  </symbol>

  <symbol id="icon-aventuras" viewBox="0 0 64 64">
    <path d="M24,24 L24,15 Q24,11 28,11 L36,11 Q40,11 40,15 L40,24" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <rect x="10" y="24" width="44" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="3"/>
    <line x1="32" y1="24" x2="32" y2="52" stroke="currentColor" stroke-width="2"/>
    <ellipse cx="20" cy="40" rx="4" ry="3.2" fill="currentColor" opacity="0.55"/>
    <circle cx="16" cy="35" r="2" fill="currentColor" opacity="0.55"/>
    <circle cx="20" cy="33.5" r="2" fill="currentColor" opacity="0.55"/>
    <circle cx="24" cy="35" r="2" fill="currentColor" opacity="0.55"/>
  </symbol>

  <symbol id="icon-series" viewBox="0 0 64 64">
    <path d="M14,16 L10,8 L16,8 L19,16 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M50,16 L54,8 L48,8 L45,16 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="8" y="16" width="48" height="10" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <line x1="18" y1="16" x2="14" y2="26" stroke="currentColor" stroke-width="2.5"/>
    <line x1="30" y1="16" x2="26" y2="26" stroke="currentColor" stroke-width="2.5"/>
    <line x1="42" y1="16" x2="38" y2="26" stroke="currentColor" stroke-width="2.5"/>
    <rect x="8" y="26" width="48" height="28" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
    <path d="M27,34 L27,46 L39,40 Z" fill="currentColor"/>
  </symbol>

  <symbol id="icon-candado" viewBox="0 0 64 64">
    <path d="M12,10 L8,2 L15,4 L19,12 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M52,10 L56,2 L49,4 L45,12 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M20,28 L20,20 Q20,10 32,10 Q44,10 44,20 L44,28" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    <rect x="12" y="28" width="40" height="30" rx="6" fill="none" stroke="currentColor" stroke-width="3.5"/>
    <circle cx="32" cy="40" r="4.5" fill="currentColor"/>
    <line x1="32" y1="44" x2="32" y2="49" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="16" y1="38" x2="10" y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="42" x2="10" y2="43" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="48" y1="38" x2="54" y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="48" y1="42" x2="54" y2="43" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <symbol id="icon-huella" viewBox="0 0 64 64">
    <ellipse cx="32" cy="42" rx="15" ry="12" fill="currentColor"/>
    <circle cx="16" cy="24" r="7" fill="currentColor"/>
    <circle cx="27" cy="14" r="7" fill="currentColor"/>
    <circle cx="40" cy="14" r="7" fill="currentColor"/>
    <circle cx="50" cy="24" r="7" fill="currentColor"/>
  </symbol>

  <symbol id="icon-corazon" viewBox="0 0 64 64">
    <path d="M32,54 C10,38 4,24 14,14 C21,7 30,10 32,18 C34,10 43,7 50,14 C60,24 54,38 32,54 Z" fill="currentColor"/>
  </symbol>
</svg>

<div class="page">
  <header class="site-header">
    <svg class="header-huella" width="28" height="28" aria-hidden="true"><use href="#icon-huella"></use></svg>
    <h1 id="header-title">Para Fernanda</h1>
    <svg class="header-huella" width="28" height="28" aria-hidden="true"><use href="#icon-huella"></use></svg>
  </header>
  <p class="site-subtitle">Hecho con cariño, especialmente para ti</p>

  <nav class="tabs" role="tablist" aria-label="Secciones">
    <button class="tab-btn active" data-tab="inicio" role="tab" aria-selected="true">
      <svg width="22" height="22" aria-hidden="true"><use href="#icon-carta"></use></svg>
      <span>Inicio</span>
    </button>
    <button class="tab-btn" data-tab="galeria" role="tab" aria-selected="false">
      <svg width="22" height="22" aria-hidden="true"><use href="#icon-galeria"></use></svg>
      <span>Galería</span>
    </button>
    <button class="tab-btn" data-tab="aventuras" role="tab" aria-selected="false">
      <svg width="22" height="22" aria-hidden="true"><use href="#icon-aventuras"></use></svg>
      <span>Aventuras</span>
    </button>
    <button class="tab-btn" data-tab="series" role="tab" aria-selected="false">
      <svg width="22" height="22" aria-hidden="true"><use href="#icon-series"></use></svg>
      <span>Series</span>
    </button>
    <button class="tab-btn tab-especial" data-tab="especial" role="tab" aria-selected="false" aria-label="Pestaña especial">
      <svg width="22" height="22" aria-hidden="true"><use href="#icon-candado"></use></svg>
    </button>
  </nav>

  <main>
    <section id="tab-inicio" class="tab-panel active" role="tabpanel">
      <div class="card carta-card">
        <svg class="carta-icono" width="34" height="34" aria-hidden="true"><use href="#icon-huella"></use></svg>
        <p class="carta-texto" id="carta-inicio-texto"></p>
      </div>
      <div class="collage-recuerdos" id="collage-recuerdos"></div>
    </section>

    <section id="tab-galeria" class="tab-panel" role="tabpanel">
      <div class="card">
        <h2>Galería</h2>
        <p class="galeria-estado" id="galeria-estado"></p>

        <div class="galeria-albumes" id="vista-albumes">
          <form class="nueva-carpeta-form" id="form-nueva-carpeta">
            <input type="text" id="input-nueva-carpeta" placeholder="Nombre de la nueva carpeta" maxlength="40" required>
            <button type="submit">Crear carpeta</button>
          </form>
          <div class="albumes-grid" id="albumes-grid"></div>
        </div>

        <div class="galeria-album-abierto" id="vista-album" hidden>
          <button class="volver-btn" id="btn-volver-albumes">&larr; Volver a carpetas</button>
          <h3 id="album-titulo"></h3>
          <label class="subir-foto-btn">
            Subir fotos
            <input type="file" id="input-subir-foto" accept="image/*" multiple hidden>
          </label>
          <div class="fotos-grid" id="fotos-grid"></div>
        </div>
      </div>
    </section>

    <section id="tab-aventuras" class="tab-panel" role="tabpanel">
      <div class="card">
        <h2>Aventuras y viajes</h2>

        <div id="aventuras-lista-view">
          <form class="nueva-item-form" id="form-nueva-aventura">
            <input type="text" id="input-nueva-aventura" placeholder="Nueva aventura..." maxlength="60" required>
            <button type="submit">Crear</button>
          </form>
          <div class="lista-tarjetas" id="lista-aventuras"></div>
        </div>

        <div id="aventura-detalle-view" hidden>
          <button class="volver-btn" id="btn-volver-aventuras">&larr; Volver</button>
          <h3 class="aventura-detalle-titulo" id="aventura-detalle-titulo"></h3>
          <div class="aventura-seccion">
            <h4>Descripción</h4>
            <textarea id="aventura-descripcion" class="aventura-textarea" placeholder="Describe esta aventura..." rows="4"></textarea>
            <button class="btn-guardar" id="btn-guardar-descripcion">Guardar</button>
          </div>
          <div class="aventura-seccion">
            <h4>Fotos</h4>
            <label class="subir-foto-btn">
              Subir fotos
              <input type="file" id="input-aventura-fotos" accept="image/*" multiple hidden>
            </label>
            <div class="fotos-grid" id="aventura-fotos-grid"></div>
          </div>
          <div class="aventura-seccion">
            <h4>Ubicación</h4>
            <input type="text" id="aventura-ubicacion" class="aventura-input" placeholder="Ej: Cancún, México">
            <button class="btn-guardar" id="btn-guardar-ubicacion">Guardar</button>
            <div id="aventura-mapa-container"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-series" class="tab-panel" role="tabpanel">
      <div class="card">
        <h2>Series que veremos</h2>
        <form class="nueva-item-form" id="form-nueva-serie">
          <input type="text" id="input-nueva-serie-titulo" placeholder="Nombre de la serie" maxlength="60" required>
          <input type="text" id="input-nueva-serie-plataforma" placeholder="Plataforma" maxlength="30">
          <button type="submit">Agregar</button>
        </form>
        <div class="lista-checklist" id="lista-series"></div>
      </div>
    </section>

    <section id="tab-especial" class="tab-panel" role="tabpanel">
      <div class="lock-screen" id="lock-screen">
        <svg class="lock-icon" width="56" height="56" aria-hidden="true"><use href="#icon-candado"></use></svg>
        <p>Esta pestaña está protegida</p>
        <form id="pin-form" autocomplete="off">
          <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="pin-input" placeholder="••••" aria-label="Contraseña">
          <button type="submit">Desbloquear</button>
        </form>
        <p class="pin-error" id="pin-error" aria-live="polite"></p>
      </div>

      <div class="especial-content" id="especial-content" hidden>
        <div class="card carta-card">
          <svg class="carta-icono" width="34" height="34" aria-hidden="true"><use href="#icon-corazon"></use></svg>
          <p class="carta-texto" id="carta-especial-texto"></p>
        </div>

        <div class="pregunta-final" id="pregunta-final">
          <h2 id="pregunta-texto"></h2>
          <div class="botones-pregunta" id="botones-pregunta">
            <button id="btn-si" type="button">Sí</button>
            <button id="btn-no" type="button">No</button>
          </div>
        </div>

        <div class="celebracion" id="celebracion" hidden>
          <svg class="celebracion-icono" width="48" height="48" aria-hidden="true"><use href="#icon-corazon"></use></svg>
          <h2 id="mensaje-si"></h2>
          <div class="confeti" id="confeti" aria-hidden="true"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar">&times;</button>
  <button class="lightbox-prev" id="lightbox-prev" aria-label="Anterior">&lsaquo;</button>
  <img class="lightbox-img" id="lightbox-img" alt="">
  <button class="lightbox-next" id="lightbox-next" aria-label="Siguiente">&rsaquo;</button>
  <p class="lightbox-counter" id="lightbox-counter"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/content.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/gallery.js"></script>
<script src="js/main.js"></script>
</body>
</html>
